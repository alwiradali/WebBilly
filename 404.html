<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — WebBilly</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif; background: #06070d; color: #eef0ff;
      min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px;
      overflow: hidden; position: relative;
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5; pointer-events: none; }
    .o1 { width: 420px; height: 420px; background: rgba(99,102,241,0.35); top: -120px; left: -100px; }
    .o2 { width: 360px; height: 360px; background: rgba(34,211,238,0.22); bottom: -120px; right: -80px; }
    .wrap { position: relative; z-index: 1; max-width: 520px; }
    .code {
      font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(4.5rem, 16vw, 8rem); line-height: 1;
      background: linear-gradient(100deg, #6366f1, #a855f7 50%, #22d3ee);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.4rem, 4vw, 2rem); margin: 8px 0 14px; }
    p { color: #9aa0b8; margin-bottom: 28px; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px; font-weight: 600; text-decoration: none; color: #fff;
      background: linear-gradient(100deg, #4f46e5, #9333ea 50%, #0e7490);
      padding: 14px 28px; border-radius: 999px; box-shadow: 0 10px 28px rgba(99,102,241,0.35);
      transition: transform 0.2s ease;
    }
    a.btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="wrap">
    <div class="code">404</div>
    <h1>This page took a wrong turn.</h1>
    <p>The page you're looking for doesn't exist — but your next website could. Let's build it.</p>
    <a class="btn" id="home" href="/">← Back to WebBilly</a>
  </div>
  <script>
    document.getElementById("home").href =
      location.pathname.indexOf("/WebBilly/") === 0 ? "/WebBilly/" : "/";
  </script>
</body>
</html>
