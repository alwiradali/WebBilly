# Cloudflare Workers static-site config for Billy Digitals.
# Serves the repository as static assets (no build step, no server code)
# and publishes directly to the custom domain.
name = "billydigitals"
compatibility_date = "2025-07-03"

# NOTE: routes must be declared BEFORE the [assets] table — in TOML any keys
# after a [table] header belong to that table.
routes = [
  { pattern = "billydigitals.com", custom_domain = true },
  { pattern = "www.billydigitals.com", custom_domain = true }
]

[assets]
directory = "."
not_found_handling = "404-page"
