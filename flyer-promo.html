<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billy Digitals — Promo Flyer</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#040814; --cyan:#38bdf8; --blue:#2b7fff; --violet:#8b5cf6; --ink:#eef3ff; --muted:#a9b8d8;
    --pop:'Poppins','Segoe UI',Arial,sans-serif; --script:'Great Vibes',cursive;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  html,body{background:#2a2f3d}
  body{font-family:var(--pop)}
  .sheet{display:flex;justify-content:center;padding:16px}
  .page{width:210mm;height:297mm;position:relative;overflow:hidden;color:var(--ink);
    background:
      radial-gradient(70% 45% at 78% 40%,rgba(43,127,255,.42),transparent 60%),
      radial-gradient(60% 40% at 12% 78%,rgba(56,189,248,.22),transparent 62%),
      linear-gradient(160deg,#071233 0%,#050c22 45%,#04081a 100%);
    box-shadow:0 12px 44px rgba(0,0,0,.5)}
  /* circuit lines */
  .circuit{position:absolute;inset:0;z-index:1;opacity:.16;
    background-image:
      linear-gradient(90deg,rgba(120,180,255,.5) 1px,transparent 1px),
      linear-gradient(rgba(120,180,255,.35) 1px,transparent 1px);
    background-size:26mm 26mm;-webkit-mask-image:radial-gradient(80% 70% at 75% 45%,#000,transparent 75%);mask-image:radial-gradient(80% 70% at 75% 45%,#000,transparent 75%)}
  .pad{position:relative;z-index:3;height:100%;padding:16mm 15mm 0}

  .logo{height:16mm;width:auto;display:block;margin:0 auto 10mm;object-fit:contain}

  /* headline */
  .head{position:relative;z-index:4}
  .script{font-family:var(--script);font-size:34pt;color:var(--cyan);line-height:.7;margin-left:3mm;
    text-shadow:0 0 18px rgba(56,189,248,.5)}
  .head h1{font-family:var(--pop);font-weight:800;font-size:41pt;line-height:.98;letter-spacing:-.01em;color:#fff;margin-top:-2mm}

  /* offering */
  .offer-h{font-family:var(--pop);font-weight:700;font-size:19pt;margin-top:12mm;
    background:linear-gradient(90deg,var(--violet),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;width:max-content}
  .list{margin-top:6mm;display:flex;flex-direction:column;gap:5.5mm;max-width:96mm;position:relative;z-index:4}
  .item{display:flex;align-items:center;gap:5mm}
  .ic{width:13mm;height:13mm;border-radius:3mm;flex-shrink:0;display:grid;place-items:center;
    background:rgba(56,189,248,.10);border:1px solid rgba(56,189,248,.4)}
  .ic svg{width:7mm;height:7mm;stroke:var(--cyan);fill:none;stroke-width:1.8}
  .item b{font-family:var(--pop);font-weight:500;font-size:14pt;color:#eaf1ff}

  .cta{margin-top:11mm;display:inline-flex;align-items:center;gap:4mm;padding:4.5mm 9mm;border-radius:999px;
    border:1.5px solid transparent;background:
      linear-gradient(#0a1330,#0a1330) padding-box,
      linear-gradient(100deg,var(--violet),var(--cyan)) border-box;
    font-family:var(--pop);font-weight:600;font-size:13pt;color:#fff;position:relative;z-index:4}

  /* devices */
  .devices{position:absolute;right:-4mm;top:84mm;width:128mm;height:150mm;z-index:2}
  .trust{margin-top:7mm;font-family:var(--pop);font-weight:500;font-size:11.5pt;color:#cfe0ff;position:relative;z-index:4}
  .trust .st{color:#ffcf4d;letter-spacing:1px}
  .laptop{position:absolute;right:6mm;top:20mm;width:118mm}
  .laptop .screen{border:2.4mm solid #16223e;border-radius:3mm 3mm 0 0;background:#0b1120;overflow:hidden;
    box-shadow:0 20mm 40mm rgba(0,0,0,.55),0 0 0 .4mm rgba(120,170,255,.25)}
  .laptop .screen img{width:100%;display:block}
  .laptop .base{width:140mm;height:3mm;margin:0 0 0 -11mm;border-radius:0 0 3mm 3mm;
    background:linear-gradient(#c3cee6,#7f8fb5);position:relative}
  .laptop .base::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24mm;height:1.4mm;background:#6b7ba3;border-radius:0 0 2mm 2mm}
  .phone{position:absolute;right:2mm;top:44mm;width:44mm;border:1.6mm solid #0e1830;border-radius:6mm;background:#0b1120;
    overflow:hidden;box-shadow:0 16mm 34mm rgba(0,0,0,.6);z-index:3}
  .phone img{width:100%;display:block}
  .phone .notch{position:absolute;top:1.6mm;left:50%;transform:translateX(-50%);width:16mm;height:3mm;background:#0e1830;border-radius:0 0 3mm 3mm;z-index:2}
  .glowdot{position:absolute;border-radius:50%;filter:blur(10mm);z-index:1}
  .glowdot.x{width:60mm;height:60mm;background:rgba(56,189,248,.4);right:14mm;top:30mm}

  /* bottom bar */
  .bar{position:absolute;left:0;right:0;bottom:9mm;z-index:5;display:flex;justify-content:center;gap:5mm;padding:0 12mm;flex-wrap:wrap}
  .seg{display:flex;align-items:center;gap:3.5mm;border:1px solid rgba(140,180,255,.4);border-radius:999px;padding:3mm 6mm;
    background:rgba(10,20,45,.5)}
  .seg svg{width:5mm;height:5mm;fill:#eaf1ff}
  .seg .ico{display:flex;gap:1.5mm}
  .seg b{font-family:var(--pop);font-weight:500;font-size:11pt;color:#eaf1ff}

  @media print{ html,body{background:#fff} .sheet{padding:0} .page{box-shadow:none} @page{size:210mm 297mm;margin:0} }
</style>
</head>
<body>
<div class="sheet">
  <section class="page">
    <div class="circuit"></div>
    <div class="glowdot x"></div>

    <!-- devices -->
    <div class="devices">
      <div class="laptop">
        <div class="screen"><img src="assets/flyer-shot.png" alt="Billy Digitals website on desktop"></div>
        <div class="base"></div>
      </div>
      <div class="phone">
        <div class="notch"></div>
        <img src="assets/flyer-shot-mobile.png" alt="Billy Digitals website on mobile">
      </div>
    </div>

    <div class="pad">
      <img class="logo" src="assets/logo-billy-lockup.png" alt="Billy Digitals">

      <div class="head">
        <div class="script">Professional</div>
        <h1>Website<br>Development</h1>
      </div>

      <div class="offer-h">We Are Offering</div>
      <div class="list">
        <div class="item"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="15" rx="2"/><path d="M3 8h18"/><circle cx="12" cy="13.5" r="2.2"/><path d="M12 10.4v.6M12 16v.6M15.1 13.5h-.6M9.5 13.5h-.6"/></svg></span><b>Custom Web Applications</b></div>
        <div class="item"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="15" rx="2"/><path d="M3 8h18"/><circle cx="11" cy="13" r="3"/><path d="M13.2 15.2 16 18"/></svg></span><b>Website Maintenance</b></div>
        <div class="item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 20V4"/><path d="M4 20h16"/><rect x="7" y="12" width="2.6" height="5"/><rect x="12" y="8" width="2.6" height="9"/><rect x="17" y="14" width="2.6" height="3"/></svg></span><b>Web Analytics &amp; Reporting</b></div>
        <div class="item"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 5h2l2 11h9l2-7H7"/><circle cx="9" cy="20" r="1.3"/><circle cx="17" cy="20" r="1.3"/></svg></span><b>E‑Commerce Development</b></div>
        <div class="item"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="M15.5 15.5 20 20"/></svg></span><b>SEO Optimisation</b></div>
      </div>

      <div class="cta">Get a Free Quote  →</div>
      <div class="trust"><span class="st">★★★★★</span>&nbsp; Rated 5.0 on Google · 7+ years · Manchester, UK</div>
    </div>

    <!-- bottom contact bar -->
    <div class="bar">
      <div class="seg">
        <span class="ico">
          <svg viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm5 5.5A4.5 4.5 0 1 0 16.5 12 4.5 4.5 0 0 0 12 7.5zm0 2A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5zM17.8 6a1.1 1.1 0 1 0 1.1 1.1A1.1 1.1 0 0 0 17.8 6z"/></svg>
          <svg viewBox="0 0 24 24"><path d="M13 22v-8h2.7l.4-3H13V9c0-.9.3-1.5 1.6-1.5H16V4.9C15.7 4.9 14.7 4.8 13.6 4.8c-2.3 0-3.9 1.4-3.9 4V11H7v3h2.7v8z"/></svg>
        </span>
        <b>billydigitals</b>
      </div>
      <div class="seg">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 5-1.3A10 10 0 1 0 12 2zm5.4 14.2c-.2.6-1.3 1.2-1.8 1.2s-1.2.2-3.9-.9a9 9 0 0 1-3.7-3.3c-.3-.4-1-1.4-1-2.6a2.9 2.9 0 0 1 .9-2.1.9.9 0 0 1 .7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c0 .2.1.3 0 .5l-.4.6-.3.3c-.1.1-.2.3-.1.5a7 7 0 0 0 1.3 1.6 6.3 6.3 0 0 0 1.9 1.2c.2.1.4.1.5 0l.8-1c.2-.2.3-.2.5-.1l1.8.9c.2.1.4.2.4.3a2.4 2.4 0 0 1-.2 1.4z"/></svg>
        <b>+44 7519 022117</b>
      </div>
      <div class="seg">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#eaf1ff" stroke-width="1.6"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" fill="none" stroke="#eaf1ff" stroke-width="1.4"/></svg>
        <b>billydigitals.com</b>
      </div>
    </div>
  </section>
</div>
</body>
</html>
